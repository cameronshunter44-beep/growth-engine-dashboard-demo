<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Luna Blu Oxford Dashboard</title>
  <style>
    :root {
      --bg: #eef2f6;
      --bg-2: #e8edf3;
      --panel: #0e1729;
      --panel-2: #13213a;
      --card: rgba(255,255,255,0.88);
      --line: #d6dfeb;
      --text: #0f172a;
      --muted: #607186;
      --white: #fff;
      --accent: #c9a867;
      --accent-soft: rgba(201,168,103,0.14);
      --success-bg: #e7f7ec;
      --success-text: #1a7d47;
      --pending-bg: #faf3e4;
      --pending-text: #936315;
      --shadow-lg: 0 24px 60px rgba(15, 23, 42, 0.12);
      --shadow-md: 0 16px 38px rgba(15, 23, 42, 0.08);
      --radius-xl: 28px;
      --radius-lg: 22px;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(124,230,222,0.15), transparent 24%),
        linear-gradient(180deg, var(--bg) 0%, var(--bg-2) 100%);
    }

    button, input, textarea { font: inherit; }

    .app {
      min-height: 100vh;
      display: grid;
      grid-template-columns: 320px 1fr;
    }

    .sidebar {
      background: linear-gradient(180deg, #091223 0%, #0d1830 55%, #101c35 100%);
      color: var(--white);
      padding: 24px;
      position: sticky;
      top: 0;
      height: 100vh;
      overflow: auto;
      border-right: 1px solid rgba(255,255,255,0.06);
    }

    .sidebar-card {
      background: linear-gradient(180deg, rgba(255,255,255,0.08), rgba(255,255,255,0.03));
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 28px;
      padding: 22px;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.04);
    }

    .eyebrow {
      font-size: 12px;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      font-weight: 900;
      color: var(--accent);
      margin-bottom: 14px;
    }

    .eyebrow.muted { color: #8ea0ba; }

    .sidebar-title {
      font-size: 30px;
      line-height: 1.02;
      margin: 0 0 12px;
      font-weight: 950;
      letter-spacing: -0.04em;
    }

    .sidebar-copy,
    .client-meta {
      color: rgba(255,255,255,0.78);
      font-size: 15px;
      line-height: 1.58;
    }

    .client-name {
      font-size: 24px;
      font-weight: 900;
      margin-bottom: 6px;
      line-height: 1.08;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      margin-top: 16px;
      padding: 12px 15px;
      border-radius: 999px;
      background: var(--accent-soft);
      border: 1px solid rgba(201,168,103,0.2);
      color: #f3d7a0;
      font-size: 13px;
      font-weight: 800;
    }

    .nav-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-top: 18px;
    }

    .nav-btn {
      width: 100%;
      text-align: left;
      padding: 16px 18px;
      border-radius: 18px;
      border: 1px solid transparent;
      background: rgba(255,255,255,0.04);
      color: rgba(255,255,255,0.94);
      font-size: 15px;
      font-weight: 800;
      cursor: pointer;
      transition: 0.18s ease;
    }

    .nav-btn:hover { background: rgba(255,255,255,0.08); }

    .nav-btn.active {
      background: linear-gradient(180deg, #ffffff 0%, #edf3f8 100%);
      color: #0f172a;
      box-shadow: 0 8px 20px rgba(0,0,0,0.14);
    }

    .list {
      margin: 10px 0 0;
      padding-left: 18px;
      display: grid;
      gap: 8px;
      line-height: 1.6;
      color: rgba(255,255,255,0.85);
      font-size: 14px;
    }

    .main { padding: 34px 30px 44px; }
    .screen { display: none; }
    .screen.active { display: block; }

    .topbar {
      display: flex;
      justify-content: space-between;
      gap: 20px;
      align-items: flex-start;
      margin-bottom: 24px;
    }

    .page-title {
      margin: 8px 0 0;
      font-size: 56px;
      line-height: 0.98;
      letter-spacing: -0.05em;
      font-weight: 950;
    }

    .page-copy {
      max-width: 920px;
      margin-top: 12px;
      font-size: 17px;
      line-height: 1.72;
      color: var(--muted);
    }

    .update-badge {
      background: rgba(255,255,255,0.82);
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 14px 18px;
      font-weight: 800;
      color: #334155;
      box-shadow: var(--shadow-md);
      white-space: nowrap;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 16px;
      margin-top: 22px;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: var(--radius-xl);
      padding: 22px;
      box-shadow: var(--shadow-md);
      backdrop-filter: blur(10px);
    }

    .stat-label {
      font-size: 13px;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      color: #66758b;
      margin-bottom: 10px;
    }

    .stat-value {
      font-size: 34px;
      font-weight: 950;
      line-height: 1.02;
      letter-spacing: -0.05em;
      margin-bottom: 10px;
    }

    .stat-detail,
    .section-subtitle,
    .row-meta,
    .soft-box,
    .score-row,
    .info-copy,
    .action-item-copy,
    .check-row {
      color: var(--muted);
      line-height: 1.68;
      font-size: 15px;
    }

    .two-col {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 18px;
      margin-top: 18px;
    }

    .stack { display: grid; gap: 14px; }

    .section-title {
      margin: 0;
      font-size: 22px;
      line-height: 1.15;
      font-weight: 900;
      letter-spacing: -0.02em;
    }

    .section-subtitle { margin: 8px 0 0; }

    .row-btn,
    .soft-box,
    .score-row,
    .info-box,
    .action-item,
    .check-item {
      width: 100%;
      background: rgba(247,249,252,0.92);
      border: 1px solid var(--line);
      border-radius: var(--radius-lg);
      padding: 18px;
    }

    .row-btn {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 18px;
      cursor: pointer;
      color: inherit;
      transition: 0.18s ease;
    }

    .row-btn:hover {
      transform: translateY(-1px);
      box-shadow: var(--shadow-md);
    }

    .row-title {
      font-size: 18px;
      font-weight: 850;
      line-height: 1.3;
      color: #0f172a;
    }

    .status {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 122px;
      padding: 10px 14px;
      border-radius: 999px;
      font-size: 13px;
      font-weight: 900;
      white-space: nowrap;
    }

    .status.live { background: var(--success-bg); color: var(--success-text); }
    .status.review { background: var(--pending-bg); color: var(--pending-text); }

    .score-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
    }

    .priority-card {
      margin-top: 24px;
      padding: 24px;
      border-radius: 28px;
      background:
        radial-gradient(circle at top right, rgba(124,230,222,0.08), transparent 28%),
        linear-gradient(135deg, #0c1830 0%, #13294b 55%, #1a3761 100%);
      border: 1px solid rgba(255,255,255,0.08);
      box-shadow: var(--shadow-lg);
      color: #fff;
    }

    .priority-card h3 {
      margin: 0 0 10px;
      font-size: 25px;
      line-height: 1.08;
      font-weight: 950;
      letter-spacing: -0.03em;
    }

    .priority-card p {
      margin: 0;
      line-height: 1.72;
      color: rgba(255,255,255,0.85);
    }

    .btn-row {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
    }

    .btn-primary, .btn-secondary {
      border-radius: 16px;
      padding: 13px 17px;
      font-weight: 850;
      border: 1px solid transparent;
      cursor: pointer;
      transition: 0.18s ease;
    }

    .btn-primary {
      background: linear-gradient(180deg, #162c4f 0%, #10223f 100%);
      color: #fff;
      box-shadow: 0 10px 22px rgba(16,34,63,0.16);
    }

    .btn-secondary {
      background: rgba(255,255,255,0.82);
      color: var(--text);
      border-color: #c8d2de;
    }

    .btn-primary.approved-btn {
      background: #1f7a45;
      cursor: default;
      box-shadow: none;
    }

    .btn-primary:disabled { opacity: 1; }

    .approval-note {
      background: #ecf8ef;
      border-color: #cfead7;
      color: #1f7a45;
      margin-top: 16px;
    }

    .locked-note {
      background: #faf5e8;
      border-color: #ecd9ad;
      color: #8d6416;
    }

    .preview-lock-card {
      position: relative;
      overflow: hidden;
      background: rgba(255,255,255,0.9);
      border: 1px solid var(--line);
      border-radius: var(--radius-xl);
      padding: 22px;
      box-shadow: var(--shadow-md);
    }

    .preview-lock-card::after {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(180deg, rgba(255,255,255,0.16), rgba(255,255,255,0.52));
      backdrop-filter: blur(4px);
      pointer-events: none;
    }

    .preview-lock-top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 16px;
      position: relative;
      z-index: 1;
    }

    .preview-lock-title {
      font-size: 20px;
      font-weight: 900;
      color: #0f172a;
      margin: 0;
      filter: blur(2px);
      opacity: 0.65;
    }

    .preview-lock-copy {
      margin-top: 10px;
      color: #64748b;
      line-height: 1.7;
      filter: blur(2px);
      opacity: 0.65;
      position: relative;
      z-index: 1;
    }

    .preview-only-pill {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 8px 12px;
      border-radius: 999px;
      background: #e8edf5;
      color: #64748b;
      font-size: 12px;
      font-weight: 900;
      white-space: nowrap;
      position: relative;
      z-index: 1;
    }

    .preview-lock-highlight {
      margin-top: 18px;
      background: linear-gradient(180deg, #12264a 0%, #0f2140 100%);
      color: #ffffff;
      border-radius: 18px;
      padding: 16px 18px;
      font-size: 15px;
      line-height: 1.65;
      font-weight: 700;
      position: relative;
      z-index: 2;
      box-shadow: 0 10px 24px rgba(15, 23, 42, 0.14);
    }

    .info-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 16px;
      margin-top: 18px;
    }

    .info-title {
      font-size: 16px;
      font-weight: 850;
      margin-bottom: 8px;
      color: #0f172a;
    }

    .action-item {
      background: linear-gradient(180deg, #fbfcfe 0%, #f6f9fc 100%);
    }

    .action-top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 12px;
    }

    .action-title {
      font-size: 18px;
      font-weight: 900;
      color: #0f172a;
      margin: 0;
    }

    .priority-pill {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 8px 12px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 900;
      white-space: nowrap;
    }

    .priority-pill.high { background: #eef5ff; color: #2456a6; }
    .priority-pill.medium { background: #f8f2e8; color: #916315; }

    .action-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
      margin-top: 14px;
    }

    .label {
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      font-weight: 900;
      color: #72849b;
      margin-bottom: 6px;
    }

    .value {
      color: #0f172a;
      font-weight: 700;
      line-height: 1.6;
    }

    .check-wrap {
      display: grid;
      gap: 14px;
    }

    .check-item {
      display: flex;
      gap: 14px;
      align-items: flex-start;
      transition: 0.18s ease;
    }

    .check-item.done {
      opacity: 0.78;
      background: #eff7f2;
      border-color: #cfe6d7;
    }

    .check-item input[type="checkbox"] {
      width: 19px;
      height: 19px;
      margin-top: 3px;
      accent-color: #1f7a45;
      cursor: pointer;
      flex: 0 0 auto;
    }

    .check-title {
      font-size: 17px;
      font-weight: 850;
      color: #0f172a;
      margin-bottom: 4px;
    }

    .completed-wrap {
      display: grid;
      gap: 12px;
      margin-top: 12px;
    }

    .completed-empty {
      font-size: 14px;
      color: #7b8ba1;
    }

    .mini-kpi {
      display: inline-flex;
      padding: 8px 12px;
      border-radius: 999px;
      background: rgba(16,34,63,0.08);
      color: #0f172a;
      font-size: 13px;
      font-weight: 800;
      margin: 8px 10px 0 0;
    }

    .modal-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(2, 6, 23, 0.62);
      display: none;
      align-items: center;
      justify-content: center;
      padding: 24px;
      z-index: 40;
      backdrop-filter: blur(4px);
    }

    .modal-backdrop.open { display: flex; }

    .modal {
      width: min(940px, 100%);
      max-height: 88vh;
      overflow: auto;
      background: #ffffff;
      border-radius: 30px;
      box-shadow: 0 28px 80px rgba(2,6,23,0.28);
      border: 1px solid #e2e8f0;
    }

    .modal-head {
      position: sticky;
      top: 0;
      background: #ffffff;
      border-bottom: 1px solid #e2e8f0;
      padding: 22px 24px;
      display: flex;
      justify-content: space-between;
      gap: 16px;
      align-items: flex-start;
      z-index: 2;
    }

    .modal-body {
      padding: 24px;
      color: #334155;
      line-height: 1.82;
    }

    .modal-title {
      margin: 0;
      font-size: 30px;
      font-weight: 950;
      color: #0f172a;
      letter-spacing: -0.03em;
    }

    .modal-sub { margin: 8px 0 0; color: var(--muted); }

    @media (max-width: 1180px) {
      .stats { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .two-col { grid-template-columns: 1fr; }
      .info-grid { grid-template-columns: 1fr; }
      .action-grid { grid-template-columns: 1fr; }
      .page-title { font-size: 46px; }
    }

    @media (max-width: 900px) {
      .app { grid-template-columns: 1fr; }
      .sidebar {
        position: relative;
        height: auto;
        border-right: none;
        border-bottom: 1px solid rgba(255,255,255,0.08);
      }
      .main { padding: 24px 18px 36px; }
      .topbar { flex-direction: column; }
      .page-title { font-size: 40px; }
    }

    @media (max-width: 640px) {
      .stats { grid-template-columns: 1fr; }
      .row-btn, .action-top { flex-direction: column; align-items: flex-start; }
      .update-badge { white-space: normal; }
    }
  </style>
</head>
<body>
  <div class="app">
    <aside class="sidebar">
      <div class="sidebar-card">
        <div class="eyebrow">Oxford Growth Engine</div>
        <div class="sidebar-title">Luna Blu Review Dashboard</div>
        <p class="sidebar-copy">A premium mock dashboard for an Oxford salon and spa business, centered on service clarity, online booking, gift certificate flow, and recurring monthly improvement opportunities.</p>
      </div>

      <div class="sidebar-card" style="margin-top:16px;">
        <div class="eyebrow muted">Business Profile</div>
        <div id="clientName" class="client-name"></div>
        <div id="clientMeta" class="client-meta"></div>
        <div id="planPill" class="pill"></div>
      </div>

      <div class="nav-list" id="navList"></div>

      <div class="sidebar-card" style="margin-top:16px;">
        <div style="font-size:14px; font-weight:800;">Big-Brand Success Focus</div>
        <ul class="list" id="focusList"></ul>
      </div>
    </aside>

    <main class="main">
      <section id="overview" class="screen active"></section>
      <section id="monthly" class="screen"></section>
      <section id="actionPlan" class="screen"></section>
      <section id="checklist" class="screen"></section>
      <section id="nextMonth" class="screen"></section>
    </main>
  </div>

  <div class="modal-backdrop" id="modalBackdrop">
    <div class="modal">
      <div class="modal-head">
        <div>
          <h2 class="modal-title" id="modalTitle"></h2>
          <p class="modal-sub" id="modalSub"></p>
        </div>
        <button class="btn-secondary" id="closeModal">Close</button>
      </div>
      <div class="modal-body" id="modalBody"></div>
    </div>
  </div>

  <script>
    const dashboardData = {
      business: {
        name: "Luna Blu salon.spa.galleria",
        city: "115 W. Spring Street · Oxford, OH 45056",
        serviceLine: "Oxford service business review dashboard",
        planStatus: "mock dashboard preview",
        dashboardTitle: "Luna Blu · Oxford Growth Dashboard"
      },

      focus: [
        "Borrow what large service brands do well: clear booking, repeat visits, gifting, and trust",
        "Turn big-brand systems into simple small-business action steps",
        "Show exactly what to fix, what to change it to, and how to implement it"
      ],

      stats: [
        {
          label: "Business Type",
          value: "Salon + Spa",
          detail: "Service mix spans salon and spa categories, so clarity and booking flow matter a lot."
        },
        {
          label: "Core Action",
          value: "Book Online",
          detail: "The site offers online booking, so improving the path to booking is a high-value lever."
        },
        {
          label: "Extra Revenue",
          value: "Gift Cards",
          detail: "Gift certificates are already offered and can be surfaced more intentionally."
        },
        {
          label: "Current Status",
          value: "Review Ready",
          detail: "This dashboard frames what is working now, what should be improved, and what unlocks next cycle."
        }
      ],

      currentView: [
        {
          label: "Main opportunity",
          value: "Service clarity",
          detail: "There are many categories, so helping first-time visitors choose faster is a key opportunity."
        },
        {
          label: "Main conversion path",
          value: "Online booking",
          detail: "Booking is already available, which makes CTA placement and page clarity more important."
        },
        {
          label: "Main support offer",
          value: "Gift certificates",
          detail: "Gift cards can support seasonal demand and should stay easy to find."
        },
        {
          label: "Main retention angle",
          value: "Monthly touchpoints",
          detail: "Newsletter signups and promotions can support repeat visits when organized cleanly."
        }
      ],

      priorities: [
        ["Big-brand pattern", "Clear next step"],
        ["Main conversion lever", "Booking visibility"],
        ["Main retention lever", "Repeat visits"],
        ["Main extra revenue lever", "Gift certificates"],
        ["Main trust lever", "Simpler customer path"]
      ],

      monthlyUpdates: {
        monthLabel: "Current Review Cycle",
        topPriority: "Use this cycle to compare Luna Blu to the habits of strong service brands: make the next step obvious, reduce customer uncertainty, increase repeat-visit behavior, and turn existing offers like gift certificates into more intentional revenue drivers.",
        completed: [
          "Reviewed the public site structure, visible booking flow, gift-certificate access, and newsletter path.",
          "Mapped the core public service categories and identified where first-time visitors may hesitate or over-scan.",
          "Compared the current customer path against strong service-brand habits like obvious booking, gifting visibility, and repeat-visit support."
        ],
        inProgress: [
          "Turning large-brand service ideas into simpler small-business changes Luna Blu could realistically use.",
          "Refining the highest-value changes around booking visibility, service selection, and first-visit confidence.",
          "Organizing the dashboard so the client sees what to change now, how to do it, and what comes next."
        ],
        unlockedNextMonth: [
          "Repeat-visit and pre-booking system improvements unlock next cycle.",
          "Seasonal promotion and gift-certificate campaign structure unlocks next cycle.",
          "Monthly retention visibility plan built around repeat visits and offers unlocks with continued support."
        ],
        notes: [
          "The point is not to copy large brands exactly. It is to borrow the parts that make them easier to buy from.",
          "This dashboard should keep translating successful big-brand systems into simpler small-business versions.",
          "The next-cycle section stays previewed so current-month value is clear without giving away the full next phase."
        ]
      },

      actionPlan: [
        {
          title: "Make the booking action feel as obvious as a major service brand",
          priority: "High",
          issue: "Strong service brands make the main action clear immediately, but smaller businesses often make visitors search too long before taking the next step.",
          changeWhat: "Move the booking action higher, repeat it more intentionally, and make it look like the most important thing to click.",
          changeTo: "Use one dominant CTA like ‘Book Your Appointment’ in the first screen area and repeat it under top service-entry sections.",
          howTo: [
            "Place one main booking button in the hero or first visible homepage section.",
            "Repeat the same CTA again below the most important service categories.",
            "Use the same wording everywhere instead of changing the CTA from page to page.",
            "Visually style that button as the primary action and reduce competing links nearby."
          ],
          whatToUse: [
            "Primary button text: ‘Book Your Appointment’",
            "Support line: ‘Choose your service and reserve your time online.’",
            "Placement: hero section + first service-entry section"
          ],
          bigBrandMove: "Major service businesses make the next step obvious right away instead of making customers guess what to do.",
          applyIt: "Luna Blu does not need a giant app or chain-level system. It just needs the booking action to feel faster, clearer, and more repeated.",
          why: "This reduces friction for high-intent visitors and brings the site closer to the easiest-to-buy-from service brands.",
          doneLooksLike: "A first-time visitor can land on the site, understand that booking is the main action, and reach the correct next step without scanning around too much."
        },
        {
          title: "Use a ‘Start Here’ structure like strong multi-service brands",
          priority: "High",
          issue: "Businesses with many services often create hesitation because the first-time customer is not sure where to begin.",
          changeWhat: "Group the most important service paths first instead of showing everything with equal visual weight.",

    const navList = document.getElementById("navList");
    const modalBackdrop = document.getElementById("modalBackdrop");
    const modalTitle = document.getElementById("modalTitle");
    const modalSub = document.getElementById("modalSub");
    const modalBody = document.getElementById("modalBody");
    const closeModal = document.getElementById("closeModal");

    function statusClass(status) {
      if (status === "Live") return "live";
      return "review";
    }

    function sectionCard(title, subtitle, body) {
      return `
        <div class="card">
          <h3 class="section-title">${title}</h3>
          <p class="section-subtitle">${subtitle}</p>
          <div class="stack" style="margin-top:18px;">${body}</div>
        </div>
      `;
    }

    function rowButton(title, meta, status, assetKey = "") {
      const clickAttr = assetKey ? `onclick="openAsset('${assetKey}')"` : "";
      return `
        <button class="row-btn" ${clickAttr}>
          <div>
            <div class="row-title">${title}</div>
            <div class="row-meta">${meta}</div>
          </div>
          <span class="status ${statusClass(status)}">${status}</span>
        </button>
      `;
    }

    function openAsset(key) {
      const asset = dashboardData.assets[key];
      if (!asset) return;
      modalTitle.textContent = asset.title;
      modalSub.textContent = asset.sub;
      modalBody.innerHTML = asset.body;
      modalBackdrop.classList.add("open");
    }

    function closeAsset() {
      modalBackdrop.classList.remove("open");
    }

    closeModal.addEventListener("click", closeAsset);
    modalBackdrop.addEventListener("click", (e) => {
      if (e.target === modalBackdrop) closeAsset();
    });

      document.getElementById("clientName").textContent = dashboardData.business.name;

      document.getElementById("planPill").textContent = dashboardData.business.planStatus;
      document.getElementById("focusList").innerHTML = dashboardData.focus.map(item => `<li>${item}</li>`).join("");
    }

    function getChecklistState(id) {
      return localStorage.getItem(`check-${id}`) === "done";
    }

    function toggleChecklist(id, checked) {
      localStorage.setItem(`check-${id}`, checked ? "done" : "open");
      renderChecklist();
    }

    function renderChecklist() {
      const openItems = dashboardData.checklist.filter(item => !getChecklistState(item.id));
      const doneItems = dashboardData.checklist.filter(item => getChecklistState(item.id));

      document.getElementById("checklist").innerHTML = `

          <div class="eyebrow muted">Checklist</div>
          <h1 class="page-title">This Month’s Checklist</h1>

    function setActiveScreen(id) {
      document.querySelectorAll('.screen').forEach(el => el.classList.remove('active'));
      document.querySelectorAll('.nav-btn').forEach(el => el.classList.remove('active'));
      document.getElementById(id).classList.add('active');
      document.querySelector(`[data-screen="${id}"]`).classList.add('active');
    }

    navList.innerHTML = navItems.map(([id, label], index) => `
      <button class="nav-btn ${index === 0 ? 'active' : ''}" data-screen="${id}">${label}</button>
    `).join('');

    navList.querySelectorAll('.nav-btn').forEach(btn => {
      btn.addEventListener('click', () => setActiveScreen(btn.dataset.screen));
